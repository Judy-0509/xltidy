<svg xmlns="http://www.w3.org/2000/svg" width="940" height="330" viewBox="0 0 940 330" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="940" height="330" fill="#ffffff"/>

  <!-- ===== LEFT: messy survey Excel ===== -->
  <text x="200" y="30" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">survey_2024Q1.xlsx</text>

  <g stroke="#d0d7de" stroke-width="1">
    <!-- merged title row -->
    <rect x="30" y="44" width="340" height="28" fill="#fff8c5"/>
    <!-- header row 1: Region merged down, vendors merged across -->
    <rect x="30" y="72" width="90" height="48" fill="#ddf4ff"/>
    <rect x="120" y="72" width="125" height="24" fill="#ddf4ff"/>
    <rect x="245" y="72" width="125" height="24" fill="#ddf4ff"/>
    <!-- header row 2 -->
    <rect x="120" y="96" width="62.5" height="24" fill="#eef6fc"/>
    <rect x="182.5" y="96" width="62.5" height="24" fill="#eef6fc"/>
    <rect x="245" y="96" width="62.5" height="24" fill="#eef6fc"/>
    <rect x="307.5" y="96" width="62.5" height="24" fill="#eef6fc"/>
    <!-- data rows -->
    <rect x="30" y="120" width="340" height="24" fill="#ffffff"/>
    <rect x="30" y="144" width="340" height="24" fill="#ffffff"/>
    <!-- subtotal row -->
    <rect x="30" y="168" width="340" height="24" fill="#ffebe9"/>
    <rect x="30" y="192" width="340" height="24" fill="#ffffff"/>
    <!-- column separators on data rows -->
    <line x1="120" y1="120" x2="120" y2="216"/>
    <line x1="182.5" y1="120" x2="182.5" y2="216"/>
    <line x1="245" y1="120" x2="245" y2="216"/>
    <line x1="307.5" y1="120" x2="307.5" y2="216"/>
  </g>

  <g font-size="11" fill="#1f2328">
    <text x="200" y="62" text-anchor="middle" font-weight="600">2024 Q1 Smartphone Shipments (K units)</text>
    <text x="75" y="100" text-anchor="middle" font-weight="600">Region</text>
    <text x="182.5" y="89" text-anchor="middle" font-weight="600">Vendor A</text>
    <text x="307.5" y="89" text-anchor="middle" font-weight="600">Vendor B</text>
    <text x="151" y="112" text-anchor="middle">Units</text>
    <text x="214" y="112" text-anchor="middle">YoY</text>
    <text x="276" y="112" text-anchor="middle">Units</text>
    <text x="339" y="112" text-anchor="middle">YoY</text>
    <text x="75" y="136" text-anchor="middle">KR</text>
    <text x="151" y="136" text-anchor="middle">1,240</text>
    <text x="214" y="136" text-anchor="middle">+4%</text>
    <text x="276" y="136" text-anchor="middle">980</text>
    <text x="339" y="136" text-anchor="middle">-2%</text>
    <text x="75" y="160" text-anchor="middle">JP</text>
    <text x="151" y="160" text-anchor="middle">860</text>
    <text x="214" y="160" text-anchor="middle">+1%</text>
    <text x="276" y="160" text-anchor="middle">1,100</text>
    <text x="339" y="160" text-anchor="middle">+6%</text>
    <text x="75" y="184" text-anchor="middle" font-weight="600">Subtotal</text>
    <text x="151" y="184" text-anchor="middle" font-weight="600">2,100</text>
    <text x="214" y="184" text-anchor="middle">·</text>
    <text x="276" y="184" text-anchor="middle" font-weight="600">2,080</text>
    <text x="339" y="184" text-anchor="middle">·</text>
    <text x="75" y="208" text-anchor="middle">US</text>
    <text x="151" y="208" text-anchor="middle">2,310</text>
    <text x="214" y="208" text-anchor="middle">+9%</text>
    <text x="276" y="208" text-anchor="middle">1,540</text>
    <text x="339" y="208" text-anchor="middle">+3%</text>
  </g>

  <!-- annotations -->
  <g font-size="10.5" fill="#cf222e">
    <text x="30" y="240">⚠ merged title &amp; headers</text>
    <text x="160" y="240">⚠ multi-level header</text>
    <text x="285" y="240">⚠ subtotal in data</text>
    <text x="30" y="258">…and the layout shifts a little every quarter</text>
  </g>

  <!-- ===== ARROW ===== -->
  <g>
    <line x1="395" y1="140" x2="520" y2="140" stroke="#2da44e" stroke-width="3"/>
    <polygon points="520,133 534,140 520,147" fill="#2da44e"/>
    <text x="464" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#2da44e">moa apply</text>
    <text x="464" y="162" text-anchor="middle" font-size="10" fill="#57606a">spec once per template</text>
    <text x="464" y="176" text-anchor="middle" font-size="10" fill="#57606a">values read deterministically</text>
  </g>

  <!-- ===== RIGHT: tidy table ===== -->
  <text x="735" y="30" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">shipments.csv · tidy &amp; DB-ready</text>

  <g stroke="#d0d7de" stroke-width="1">
    <rect x="565" y="44" width="340" height="24" fill="#dafbe1"/>
    <rect x="565" y="68" width="340" height="24" fill="#ffffff"/>
    <rect x="565" y="92" width="340" height="24" fill="#f6f8fa"/>
    <rect x="565" y="116" width="340" height="24" fill="#ffffff"/>
    <rect x="565" y="140" width="340" height="24" fill="#f6f8fa"/>
    <rect x="565" y="164" width="340" height="24" fill="#ffffff"/>
    <rect x="565" y="188" width="340" height="24" fill="#f6f8fa"/>
    <line x1="640" y1="44" x2="640" y2="212"/>
    <line x1="700" y1="44" x2="700" y2="212"/>
    <line x1="775" y1="44" x2="775" y2="212"/>
    <line x1="840" y1="44" x2="840" y2="212"/>
  </g>

  <g font-size="11" fill="#1f2328">
    <g font-weight="600">
      <text x="602" y="60" text-anchor="middle">period</text>
      <text x="670" y="60" text-anchor="middle">region</text>
      <text x="737" y="60" text-anchor="middle">vendor</text>
      <text x="807" y="60" text-anchor="middle">metric</text>
      <text x="872" y="60" text-anchor="middle">value</text>
    </g>
    <text x="602" y="84" text-anchor="middle">2024Q1</text><text x="670" y="84" text-anchor="middle">KR</text><text x="737" y="84" text-anchor="middle">A</text><text x="807" y="84" text-anchor="middle">units</text><text x="872" y="84" text-anchor="middle">1240</text>
    <text x="602" y="108" text-anchor="middle">2024Q1</text><text x="670" y="108" text-anchor="middle">KR</text><text x="737" y="108" text-anchor="middle">A</text><text x="807" y="108" text-anchor="middle">yoy</text><text x="872" y="108" text-anchor="middle">0.04</text>
    <text x="602" y="132" text-anchor="middle">2024Q1</text><text x="670" y="132" text-anchor="middle">KR</text><text x="737" y="132" text-anchor="middle">B</text><text x="807" y="132" text-anchor="middle">units</text><text x="872" y="132" text-anchor="middle">980</text>
    <text x="602" y="156" text-anchor="middle">2024Q1</text><text x="670" y="156" text-anchor="middle">JP</text><text x="737" y="156" text-anchor="middle">A</text><text x="807" y="156" text-anchor="middle">units</text><text x="872" y="156" text-anchor="middle">860</text>
    <text x="602" y="180" text-anchor="middle">2024Q1</text><text x="670" y="180" text-anchor="middle">JP</text><text x="737" y="180" text-anchor="middle">B</text><text x="807" y="180" text-anchor="middle">units</text><text x="872" y="180" text-anchor="middle">1100</text>
    <text x="602" y="204" text-anchor="middle">2024Q1</text><text x="670" y="204" text-anchor="middle">US</text><text x="737" y="204" text-anchor="middle">A</text><text x="807" y="204" text-anchor="middle">units</text><text x="872" y="204" text-anchor="middle">2310</text>
  </g>

  <g font-size="10.5" fill="#1a7f37">
    <text x="565" y="240">✓ 1 row = 1 fact, subtotals dropped</text>
    <text x="565" y="258">✓ reconciled: subtotal == Σ components · verified: random sample round-trip</text>
    <text x="565" y="276">✓ monthly/quarterly files stack into one time series (period)</text>
  </g>

  <!-- footer -->
  <text x="470" y="312" text-anchor="middle" font-size="10" fill="#8c959f">merged cells · multi-level headers · subtotal rows · pivot tables — in. tidy long-format tables — out.</text>
</svg>
