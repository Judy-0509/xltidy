name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Excel/COM tests (-m excel) need a desktop Excel install, which GitHub
    # runners don't have — so CI runs only the pure core suite + the
    # openpyxl-ban guard. The COM tests stay desktop-only.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install (editable + dev deps)
        run: python -m pip install -e ".[dev]"
      - name: Test (core only, no Excel)
        run: python -m pytest -m "not excel" -q
